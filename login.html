<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - MediHealth</title>
    <link rel="stylesheet" href="css/auth.css">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <!-- NAVIGATION -->
    <header class="main-header">
        <div class="container-fluid navbar">
            <div class="logo">
                <a href="index.html" class="logo_a"> MediHealth </a>            
            </div>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="aboutUs.html">About Us</a></li>
                <li><a href="services.html">Services</a></li>
                <li><a href="contactUs.html">Contact Us</a></li>
            </ul>
            <a href="login.html" class="nav-cta">Get Started</a>
        </div>
    </header>

    <!-- AUTHENTICATION -->
    <div class="auth-wrapper">
        <div class="auth-card">
            <div class="auth-header">
                <h2>Welcome back</h2>
                <p>Don't have an account? <a href="register.html">Sign up</a></p>
            </div>

            <form action="dashboard.html" method="POST">
                <div class="form-group">
                    <label class="form-label" for="email">Work Email</label>
                    <input class="form-input" type="email" id="email" placeholder="name@company.com" required>
                </div>

                <div class="form-group">
                    <label class="form-label" for="password">Password</label>
                    <input class="form-input" type="password" id="password" placeholder="••••••••" required>
                </div>

                <div class="form-options">
                    <label class="checkbox-label">
                        <input type="checkbox"> Remember me
                    </label>
                    <a href="#" class="forgot-link">Forgot password?</a>
                </div>

                <button type="submit" class="btn-submit">Sign In</button>
            </form>
        </div>
    </div>

</body>
</html>
