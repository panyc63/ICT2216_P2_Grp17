# MediFlow PRODUCTION stack for a single VM.
#
# Topology (one public origin, auto-HTTPS):
#   Internet --443--> caddy --> frontend (nginx: static SPA + /api proxy) --> backend --> db (MySQL)
# Only Caddy is published (80/443); backend and db stay on the internal compose network.
#
# Usage on the VM:
#   cp .env.production.example .env.production   # then fill in real values
#   docker compose -f docker-compose.prod.yml --env-file .env.production up -d --build
services:
  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:?set DB_PASSWORD in .env.production}
      MYSQL_DATABASE: ${DB_NAME:-mediflow_db}
    volumes:
      - db_data:/var/lib/mysql
      - ./setup.sql:/docker-entrypoint-initdb.d/01-setup.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 30

  backend:
    build: ./backend
    restart: unless-stopped
    env_file: .env.production
    environment:
      NODE_ENV: production
      DB_HOST: db
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "5000"

  frontend:
    build:
      context: ./frontend
      args:
        # Same-origin: the SPA calls /api, which the frontend nginx proxies to backend.
        VITE_API_URL: /api
    restart: unless-stopped
    depends_on:
      - backend
    expose:
      - "8080"

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - frontend
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN:?set DOMAIN in .env.production}
      ACME_EMAIL: ${ACME_EMAIL:?set ACME_EMAIL in .env.production}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  db_data:
  caddy_data:
  caddy_config:
