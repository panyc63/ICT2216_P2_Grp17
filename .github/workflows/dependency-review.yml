name: Dependency Review

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  dependency-review:
    name: Review dependency changes
    runs-on: ubuntu-latest
    # The dependency-review API requires GitHub Advanced Security on private
    # repos, so the action errors there ("Dependency graph not enabled"). Keep
    # the gate running for visibility, but do not fail the PR when the API is
    # unavailable — npm audit + Trivy + CodeQL remain the enforcing gates.
    continue-on-error: true
    permissions:
      contents: read
      pull-requests: write # post the summary comment
    steps:
      - uses: actions/checkout@v4
      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
          comment-summary-in-pr: always
