name: Shell Lint (ShellCheck)

on:
  push:
    branches: [main]
    paths:
      - "**/*.sh"
      - ".github/workflows/shellcheck.yml"
  pull_request:
    branches: [main]
    paths:
      - "**/*.sh"
      - ".github/workflows/shellcheck.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  shellcheck:
    name: Lint shell scripts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@2.0.0
        env:
          # Treat warnings as failures so shell issues can't merge silently.
          SHELLCHECK_OPTS: -S warning
        with:
          scandir: "."
          severity: warning
