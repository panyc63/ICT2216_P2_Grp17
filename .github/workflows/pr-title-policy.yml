name: PR Title Policy

# Require pull-request titles to follow Conventional Commits (semantic titles),
# because squash-merges use the PR title as the commit subject on main.

on:
  pull_request:
    types: [opened, edited, synchronize]

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: pr-title-policy-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  semantic-title:
    name: Validate semantic PR title
    runs-on: ubuntu-latest
    steps:
      - name: Check PR title
        uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # Conventional Commit types accepted in the title.
          types: |
            build
            chore
            ci
            docs
            feat
            fix
            perf
            refactor
            revert
            style
            test
          # A scope is optional; when present it must be lower-case kebab/dot/slash.
          requireScope: false
          # Subject must not start with an upper-case letter and must not end with a period.
          subjectPattern: ^(?![A-Z])(?!.*[.]$).+$
          subjectPatternError: |
            The subject "{subject}" is invalid for the "{type}" type.
            It must start with a lower-case letter and must not end with a period.
