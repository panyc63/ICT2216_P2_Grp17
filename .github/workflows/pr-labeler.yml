name: PR Labeler

# Automatically apply labels to a pull request based on the paths it changes,
# using the mapping in .github/labeler.yml. Improves triage and routing.

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

concurrency:
  group: pr-labeler-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  label:
    name: Apply path-based labels
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write # required to add labels to the PR
    steps:
      - uses: actions/labeler@v5
        with:
          configuration-path: .github/labeler.yml
          sync-labels: true
