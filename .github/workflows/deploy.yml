name: Deploy to VM

# Continuous deployment, gated on CI. A push to main runs the "CI" workflow; only when CI
# succeeds does this deploy fire (via workflow_run), so a red build never reaches production.
# workflow_dispatch is kept as a manual fallback. Configure the repository secrets below
# (Settings -> Secrets and variables -> Actions):
#   DEPLOY_SSH_HOST   - VM public IP / hostname
#   DEPLOY_SSH_USER   - SSH user (e.g. ubuntu)
#   DEPLOY_SSH_KEY    - private SSH key with access to the VM
#   DEPLOY_PATH       - path to the cloned repo on the VM (e.g. /home/ubuntu/ICT2216_P2_Grp17)
on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: SSH redeploy
    runs-on: ubuntu-latest
    # Manual runs always deploy; automatic runs only deploy when the triggering CI passed.
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    # Records a GitHub Deployment against the "production" environment on every run
    # (populates the repo's Environments/Deployments panel and gives a deploy history).
    # Add environment protection rules/required reviewers under Settings -> Environments.
    environment:
      name: production
      url: https://3.16.29.44.sslip.io/
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.DEPLOY_SSH_HOST }}
          username: ${{ secrets.DEPLOY_SSH_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e
            cd "${{ secrets.DEPLOY_PATH }}"
            git pull --ff-only
            docker compose -f docker-compose.prod.yml --env-file .env.production up -d --build
            docker image prune -f
