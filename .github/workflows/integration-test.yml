name: Integration Security Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: integration-${{ github.ref }}
  cancel-in-progress: true

jobs:
  integration:
    name: API security integration tests
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: rootpass
          MYSQL_DATABASE: mediflow_db
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -prootpass --silent"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=20

    env:
      NODE_ENV: test
      PORT: "5000"
      DB_HOST: 127.0.0.1
      DB_PORT: "3306"
      DB_USER: root
      DB_PASSWORD: rootpass
      DB_NAME: mediflow_db
      BASE_URL: http://127.0.0.1:5000
      JWT_SECRET: ci-only-jwt-secret-change-me-32-bytes-minimum
      CSRF_SECRET: ci-only-csrf-secret-change-me-32-bytes-minimum
      DATA_ENCRYPTION_KEY: ci-only-data-encryption-key-32-bytes-minimum
      MC_SIGNING_KEY: ci-only-mc-signing-key-32-bytes-minimum-ok
      STRIPE_WEBHOOK_SECRET: whsec_ci_only_test_secret
      CORS_ORIGINS: http://127.0.0.1:5173

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install MySQL client
        run: sudo apt-get update && sudo apt-get install -y default-mysql-client

      - name: Seed database schema and fixtures
        run: mysql -h 127.0.0.1 -P 3306 -uroot -prootpass < setup.sql

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Start API server
        working-directory: backend
        run: |
          node server.js &
          echo $! > server.pid
          for i in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:5000/api/health >/dev/null 2>&1; then
              echo "API is up"; exit 0
            fi
            sleep 1
          done
          echo "API failed to start"; exit 1

      - name: Run integration security tests
        working-directory: backend
        run: node --test integration.test.js

      - name: Stop API server
        if: always()
        working-directory: backend
        run: kill "$(cat server.pid)" || true
