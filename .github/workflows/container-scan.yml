name: Container & IaC Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 4 * * 3" # weekly, Wednesday 04:00 UTC
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: container-scan-${{ github.ref }}
  cancel-in-progress: true

jobs:
  hadolint:
    name: Dockerfile lint (hadolint)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        dockerfile: [backend/Dockerfile, frontend/Dockerfile]
    steps:
      - uses: actions/checkout@v7
      - uses: hadolint/hadolint-action@v3.3.0
        with:
          dockerfile: ${{ matrix.dockerfile }}
          failure-threshold: warning

  trivy:
    name: Trivy filesystem & config scan
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
    steps:
      - uses: actions/checkout@v7

      # Install Trivy from its apt repo (robust — avoids action tag-resolution issues).
      - name: Install Trivy
        run: |
          sudo apt-get update
          sudo apt-get install -y wget gnupg
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | gpg --dearmor | sudo tee /usr/share/keyrings/trivy.gpg > /dev/null
          echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb generic main" | sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update
          sudo apt-get install -y trivy

      - name: Trivy filesystem scan (vuln, secret, misconfig)
        run: |
          trivy fs --scanners vuln,secret,misconfig \
            --severity CRITICAL,HIGH \
            --format sarif --output trivy.sarif \
            --exit-code 0 --no-progress .

      - name: Upload Trivy SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy.sarif
          category: trivy
