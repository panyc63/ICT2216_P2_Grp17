# coturn TURN server for MediFlow WebRTC (Phase 5).
# Uses the time-limited shared-secret scheme: credentials are minted by the backend
# (GET /api/consultations/:id/rtc-credentials) via HMAC-SHA1 over an expiry timestamp.
# Run via docker-compose.prod.yml (service `coturn`). Open UDP/TCP 3478 and the relay
# port range in the security group / firewall.

listening-port=3478
fingerprint
use-auth-secret
# static-auth-secret must equal TURN_SECRET in .env.production
static-auth-secret=REPLACE_WITH_TURN_SECRET
realm=mediflow
# Public IP of the host (EC2 Elastic IP); set external-ip for NAT traversal.
# external-ip=YOUR_PUBLIC_IP
total-quota=100
stale-nonce=600
no-tlsv1
no-tlsv1_1
# Restrict relay range and lock down to avoid open-relay abuse.
min-port=49160
max-port=49200
no-cli
no-multicast-peers
