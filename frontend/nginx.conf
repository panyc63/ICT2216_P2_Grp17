server {
    listen 8080;
    server_name _;

    # Do not leak the nginx version.
    server_tokens off;

    # Real client IP recovery. This nginx sits behind Caddy on the internal compose
    # network, so $remote_addr is Caddy's container IP. Caddy forwards the true client in
    # X-Forwarded-For; trust the private compose ranges and resolve the real client so that
    # $binary_remote_addr (used by limit_req below) and the X-Real-IP we forward to the
    # backend both reflect the actual caller — not an internal hop. nginx never receives
    # traffic from outside the compose network, so trusting these ranges is safe.
    set_real_ip_from 10.0.0.0/8;
    set_real_ip_from 172.16.0.0/12;
    set_real_ip_from 192.168.0.0/16;
    real_ip_header X-Forwarded-For;
    real_ip_recursive on;

    # Baseline security response headers (defence-in-depth for the static SPA).
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "no-referrer" always;
    # Allow camera + mic for our own origin (WebRTC video consultation); everything else off.
    add_header Permissions-Policy "camera=(self), microphone=(self), geolocation=()" always;
    # Cloudflare Turnstile (challenges.cloudflare.com) is the only permitted cross-origin
    # source: its script + challenge iframe are needed for the anti-automation widget on
    # login/register/triage. Everything else stays pinned to 'self'.
    add_header Content-Security-Policy "default-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self' https://challenges.cloudflare.com; connect-src 'self' https://challenges.cloudflare.com stun: turn: turns:; frame-src https://challenges.cloudflare.com; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'" always;
    # Cross-origin isolation. COEP is 'credentialless' (not 'require-corp') so the Turnstile
    # iframe can load without a CORP header while the page stays cross-origin isolated.
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Resource-Policy "same-origin" always;
    add_header Cross-Origin-Embedder-Policy "credentialless" always;

    root /usr/share/nginx/html;
    index index.html;

    # Edge rate-limit tripped -> standardized JSON body + Retry-After (matches the backend's
    # own 429 shape) instead of nginx's default HTML error page.
    error_page 429 = @ratelimited;
    location @ratelimited {
        default_type application/json;
        add_header Retry-After 60 always;
        return 429 '{"status":"error","message":"Too many requests. Please retry later."}';
    }

    # Proxy API calls to the backend service (compose network).
    location /api/ {
        # Leaky-bucket API throttle at the edge (zone defined in the ratelimit module copied
        # to conf.d). Bursts to 20 with no artificial delay; anything beyond -> @ratelimited.
        limit_req zone=api_rl burst=20 nodelay;
        limit_req_status 429;

        proxy_pass http://backend:5000;
        # Reviewed: the backend does not trust the Host header (it uses CORS_ORIGINS +
        # BACKEND_PUBLIC_URL from env), and Caddy validates the host upstream.
        # nosemgrep: generic.nginx.security.request-host-used.request-host-used
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA history-mode fallback.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
