server {
    listen 8080;
    server_name _;

    # Do not leak the nginx version.
    server_tokens off;

    # Baseline security response headers (defence-in-depth for the static SPA).
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy "default-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self'; connect-src 'self' stun: turn: turns:; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'" always;
    # Cross-origin isolation. Safe because the CSP above already pins every
    # subresource to 'self' (no cross-origin resources for require-corp to block).
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Resource-Policy "same-origin" always;
    add_header Cross-Origin-Embedder-Policy "require-corp" always;

    root /usr/share/nginx/html;
    index index.html;

    # Proxy API calls to the backend service (compose network).
    location /api/ {
        proxy_pass http://backend:5000;
        # Reviewed: the backend does not trust the Host header (it uses CORS_ORIGINS +
        # BACKEND_PUBLIC_URL from env), and Caddy validates the host upstream.
        # nosemgrep: generic.nginx.security.request-host-used.request-host-used
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA history-mode fallback.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
