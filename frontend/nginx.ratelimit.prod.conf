# --- Production API rate limiting (tight) ------------------------------------------------
# `limit_req_zone` is an http-context directive, so this module is copied into
# /etc/nginx/conf.d/ (which the stock nginx.conf includes at the http level) as
# 00-ratelimit.conf — ahead of default.conf, so the zone exists before the server block
# references it.
#
# The key is $binary_remote_addr, which resolves to the REAL client IP because default.conf's
# server block runs the real_ip module (Caddy -> nginx -> backend); without that it would key
# every request to Caddy's container address. Leaky-bucket: 10 req/s sustained per client,
# bursting to 20 (burst is set on `limit_req` in the server block) with no artificial delay.
limit_req_zone $binary_remote_addr zone=api_rl:10m rate=10r/s;
