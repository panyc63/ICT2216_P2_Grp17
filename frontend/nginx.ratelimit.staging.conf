# --- Staging API rate limiting (extended headroom for QA / load testing) -----------------
# Drop-in replacement for nginx.ratelimit.prod.conf: same zone name (api_rl) so the server
# block's `limit_req zone=api_rl ...` works unchanged — only the sustained rate is looser so
# functional/load tests aren't throttled. To use it in a staging build, copy THIS file to
# /etc/nginx/conf.d/00-ratelimit.conf instead of the prod module.
limit_req_zone $binary_remote_addr zone=api_rl:10m rate=50r/s;
