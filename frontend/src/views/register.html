<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - MediHealth</title>
    <link rel="stylesheet" href="css/auth.css">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <header class="main-header">
        <div class="container-fluid navbar">
            <div class="logo">
                <a href="index.html" class="logo_a"> MediHealth </a>            
            </div>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="aboutUs.html">About Us</a></li>
                <li><a href="services.html">Services</a></li>
                <li><a href="contactUs.html">Contact Us</a></li>
            </ul>
            <a href="login.html" class="nav-cta">Get Started</a>
        </div>
    </header>

    <div class="auth-wrapper">
        <div class="auth-card">
            <div class="auth-header">
                <h2>Get started free</h2>
                <p>Already have an account? <a href="login.html">Sign in</a></p>
            </div>

            <form>
                <div class="form-group">
                    <label class="form-label" for="name">Full Name</label>
                    <input class="form-input" type="text" id="name" placeholder="Alex Rivera" required>
                </div>

                <div class="form-group">
                    <label class="form-label" for="email">Work Email</label>
                    <input class="form-input" type="email" id="email" placeholder="name@company.com" required>
                </div>

                <div class="form-group">
                    <label class="form-label" for="password">Password</label>
                    <input class="form-input" type="password" id="password" placeholder="At least 8 characters" required>
                </div>

                <div class="form-options">
                    <label class="checkbox-label">
                        <input type="checkbox" required> I agree to the terms & privacy policy
                    </label>
                </div>

                <button type="submit" class="btn-submit">Create Account</button>
            </form>
        </div>
    </div>

</body>
</html>
