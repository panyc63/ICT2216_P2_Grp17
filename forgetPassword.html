<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - MediHealth</title>
    <link rel="stylesheet" href="css/auth.css">
</head>
<body>

    <!-- NAVIGATION -->
    <header class="main-header">
        <div class="container-fluid navbar">
            <div class="logo">
                <a href="index.html" class="logo_a">MediHealth</a>
            </div>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="aboutUs.html">About Us</a></li>
                <li><a href="services.html">Services</a></li>
                <li><a href="contactUs.html">Contact Us</a></li>
            </ul>
            <a href="login.html" class="nav-cta">Get Started</a>
        </div>
    </header>

    <!-- AUTHENTICATION CONTAINER -->
    <div class="auth-wrapper">
        <div class="auth-card">
            <div class="auth-header">
                <h2>Reset password</h2>
                <p>Enter your email address and we'll send you a link to reset your password.</p>
            </div>

            <form>
                <div class="form-group">
                    <label class="form-label" for="email">Work Email</label>
                    <input class="form-input" type="email" id="email" placeholder="name@company.com" required>
                </div>

                <button type="submit" class="btn-submit" style="margin-bottom: 20px;">Send Reset Link</button>
                
                <div style="text-align: center; font-size: 14px;">
                    <a href="login.html" class="forgot-link" style="color: var(--accent-primary); font-weight: 600;">
                        ← Back to sign in
                    </a>
                </div>
            </form>
        </div>
    </div>

</body>
</html>
